<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวณัฏฐ์ดวงดู</title>
    <script src="https://d.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 12px 30px;
            border: none;
            background: white;
            color: #667eea;
            font-size: 1em;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .tab-button.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-option input[type="radio"] {
            width: auto;
            cursor: pointer;
        }

        .button {
            padding: 12px 30px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: #f0f0f0;
            color: #333;
        }

        .button.danger {
            background: #ff6b6b;
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .queue-item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .queue-item.completed {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        .queue-info {
            flex: 1;
            min-width: 200px;
        }

        .queue-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .queue-details {
            font-size: 0.9em;
            color: #666;
        }

        .queue-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .queue-actions button {
            padding: 8px 15px;
            font-size: 0.9em;
            min-width: 100px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .user-profile img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .user-info h3 {
            margin: 0;
            color: #333;
        }

        .user-info p {
            margin: 5px 0 0 0;
            color: #666;
            font-size: 0.9em;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: block;
            padding: 12px;
            background: #f0f0f0;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-input-label:hover {
            background: #e8e8ff;
        }

        .file-preview {
            margin-top: 10px;
            max-width: 200px;
            border-radius: 8px;
        }

        .datetime-input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-button {
                width: 100%;
            }

            .card {
                padding: 20px;
            }

            .queue-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .queue-actions {
                width: 100%;
            }

            .queue-actions button {
                flex: 1;
            }

            .datetime-input-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 จองคิวณัฏฐ์ดวงดู</h1>
            <p>ระบบจองคิวออนไลน์</p>
        </header>

        <!-- LOGIN SECTION -->
        <div id="loginSection" class="card">
            <h2>🔐 เข้าสู่ระบบด้วย LINE</h2>
            <p style="margin-bottom: 20px; color: #666;">กรุณาเข้าสู่ระบบด้วยบัญชี LINE เพื่อจองคิว</p>
            <button class="button" onclick="loginWithLine()">🔗 เข้าสู่ระบบด้วย LINE</button>
        </div>

        <!-- MAIN INTERFACE -->
        <div id="mainInterface" style="display: none;">
            <div class="card">
                <div class="user-profile">
                    <img id="userPicture" src="" alt="Profile">
                    <div class="user-info">
                        <h3 id="userName">Loading...</h3>
                        <p>ยินดีต้อนรับ</p>
                    </div>
                    <button class="button secondary" style="width: auto; margin-left: auto;" onclick="logout()">ออกจากระบบ</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('booking')">จองคิว</button>
                <button class="tab-button" onclick="switchTab('queue')">ดูคิว</button>
                <button class="tab-button" onclick="switchTab('admin')">จัดการคิว</button>
            </div>

            <!-- TAB: BOOKING -->
            <div id="booking" class="tab-content active">
                <div class="card">
                    <h2>จองคิว</h2>
                    <div class="success-message" id="bookingSuccess">✓ จองคิวสำเร็จ! ระบบจะส่งแจ้งเตือนไปยัง LINE ของคุณ</div>
                    <div class="error-message" id="bookingError"></div>

                    <div class="form-group">
                        <label>เลือกประเภทการจอง</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="typeWalkin" name="queueType" value="walkin" checked onchange="updateQueueTypeDisplay()">
                                <label for="typeWalkin">จองคิวแบบพิมพ์ (ปกติ)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="typePhone" name="queueType" value="phone" onchange="updateQueueTypeDisplay()">
                                <label for="typePhone">จองคิวแบบโทร (ระบุวัน/เวลา)</label>
                            </div>
                        </div>
                    </div>

                    <!-- WALKIN SECTION -->
                    <div id="walkinSection" class="queue-type-section" style="display: block;">
                        <div class="form-group">
                            <label>อัปโหลด Slip เพื่อยืนยันการจอง *</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="walkinSlip" accept="image/*" onchange="previewImage('walkinSlip', 'walkinPreview')">
                                <label for="walkinSlip" class="file-input-label">
                                    📸 คลิกเพื่ออัปโหลดรูปสลิป หรือลาก-วาง
                                </label>
                            </div>
                            <img id="walkinPreview" class="file-preview" style="display: none;">
                        </div>
                        <button class="button" onclick="bookWalkinQueue()">จองคิวเลย</button>
                    </div>

                    <!-- PHONE SECTION -->
                    <div id="phoneSection" class="queue-type-section" style="display: none;">
                        <div class="form-group">
                            <label for="phoneDate">เลือกวัน *</label>
                            <input type="date" id="phoneDate" required>
                        </div>
                        <div class="form-group">
                            <label for="phoneTime">เลือกเวลา *</label>
                            <input type="time" id="phoneTime" required>
                        </div>
                        <div class="form-group">
                            <label for="phoneDuration">ระยะเวลาที่ต้องการ *</label>
                            <select id="phoneDuration" required>
                                <option value="">-- เลือกระยะเวลา --</option>
                                <option value="15">15 นาที</option>
                                <option value="30">30 นาที (ครึ่งชั่วโมง)</option>
                                <option value="60">1 ชั่วโมง</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>อัปโหลด Slip เพื่อยืนยันการจอง *</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="phoneSlip" accept="image/*" onchange="previewImage('phoneSlip', 'phonePreview')">
                                <label for="phoneSlip" class="file-input-label">
                                    📸 คลิกเพื่ออัปโหลดรูปสลิป หรือลาก-วาง
                                </label>
                            </div>
                            <img id="phonePreview" class="file-preview" style="display: none;">
                        </div>
                        <button class="button" onclick="bookPhoneQueue()">จองคิวเลย</button>
                    </div>
                </div>
            </div>

            <!-- TAB: QUEUE -->
            <div id="queue" class="tab-content">
                <div class="card">
                    <h2>รายการคิวปัจจุบัน</h2>
                    <div id="queueList"></div>
                </div>
            </div>

            <!-- TAB: ADMIN -->
            <div id="admin" class="tab-content">
                <div class="card">
                    <h2>จัดการคิว (สำหรับเจ้าของ)</h2>
                    <div id="adminQueueList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        const API_BASE_URL = 'http://localhost:3000'; // Change to your backend URL
        const LIFF_ID = '2010715428'; // Your LIFF ID
        let currentUser = null;
        let authToken = null;

        // ============ INITIALIZATION ============
        window.addEventListener('load', async () => {
            try {
                await liff.init({ liffId: LIFF_ID });
                
                if (liff.isLoggedIn()) {
                    await handleLineLogin();
                } else {
                    showLoginSection();
                }
            } catch (error) {
                console.error('LIFF Init Error:', error);
                showError('bookingError', 'เกิดข้อผิดพลาด: ' + error.message);
            }
        });

        // ============ LINE LOGIN ============
        async function loginWithLine() {
            try {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    await handleLineLogin();
                }
            } catch (error) {
                console.error('Login Error:', error);
                showError('bookingError', 'เข้าสู่ระบบไม่สำเร็จ');
            }
        }

        async function handleLineLogin() {
            try {
                const profile = await liff.getProfile();
                
                currentUser = {
                    userId: profile.userId,
                    displayName: profile.displayName,
                    pictureUrl: profile.pictureUrl
                };

                // Update UI
                document.getElementById('userName').textContent = currentUser.displayName;
                document.getElementById('userPicture').src = currentUser.pictureUrl;
                
                showMainInterface();
                loadQueues();
            } catch (error) {
                console.error('Get Profile Error:', error);
                showError('bookingError', 'ไม่สามารถดึงข้อมูลโปรไฟล์ได้');
            }
        }

        function logout() {
            liff.logout();
            location.reload();
        }

        // ============ UI FUNCTIONS ============
        function showLoginSection() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('mainInterface').style.display = 'none';
        }

        function showMainInterface() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainInterface').style.display = 'block';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'queue') {
                loadQueues();
            } else if (tabName === 'admin') {
                loadAdminQueues();
            }
        }

        function updateQueueTypeDisplay() {
            const type = document.querySelector('input[name="queueType"]:checked').value;
            
            if (type === 'walkin') {
                document.getElementById('walkinSection').style.display = 'block';
                document.getElementById('phoneSection').style.display = 'none';
            } else {
                document.getElementById('walkinSection').style.display = 'none';
                document.getElementById('phoneSection').style.display = 'block';
            }
        }

        function previewImage(inputId, previewId) {
            const file = document.getElementById(inputId).files[0];
            const preview = document.getElementById(previewId);

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        // ============ BOOKING FUNCTIONS ============
        async function bookWalkinQueue() {
            try {
                const slipFile = document.getElementById('walkinSlip').files[0];

                if (!slipFile) {
                    showError('bookingError', 'กรุณาอัปโหลด Slip');
                    return;
                }

                const formData = new FormData();
                formData.append('type', 'walkin');
                formData.append('slip', slipFile);

                const response = await fetch(`${API_BASE_URL}/api/book-queue`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Booking failed');
                }

                document.getElementById('bookingSuccess').style.display = 'block';
                document.getElementById('walkinSlip').value = '';
                document.getElementById('walkinPreview').style.display = 'none';

                setTimeout(() => {
                    document.getElementById('bookingSuccess').style.display = 'none';
                    loadQueues();
                }, 3000);
            } catch (error) {
                showError('bookingError', error.message);
            }
        }

        async function bookPhoneQueue() {
            try {
                const date = document.getElementById('phoneDate').value;
                const time = document.getElementById('phoneTime').value;
                const duration = document.getElementById('phoneDuration').value;
                const slipFile = document.getElementById('phoneSlip').files[0];

                if (!date || !time || !duration || !slipFile) {
                    showError('bookingError', 'กรุณากรอกข้อมูลให้ครบถ้วน');
                    return;
                }

                const formData = new FormData();
                formData.append('type', 'phone');
                formData.append('scheduledDate', date);
                formData.append('scheduledTime', time);
                formData.append('duration', duration);
                formData.append('slip', slipFile);

                const response = await fetch(`${API_BASE_URL}/api/book-queue`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Booking failed');
                }

                document.getElementById('bookingSuccess').style.display = 'block';
                document.getElementById('phoneDate').value = '';
                document.getElementById('phoneTime').value = '';
                document.getElementById('phoneDuration').value = '';
                document.getElementById('phoneSlip').value = '';
                document.getElementById('phonePreview').style.display = 'none';

                setTimeout(() => {
                    document.getElementById('bookingSuccess').style.display = 'none';
                    loadQueues();
                }, 3000);
            } catch (error) {
                showError('bookingError', error.message);
            }
        }

        // ============ QUEUE DISPLAY ============
        async function loadQueues() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/queues`);
                const data = await response.json();
                const queues = data.queues || [];

                const queueList = document.getElementById('queueList');

                if (queues.length === 0) {
                    queueList.innerHTML = '<div class="empty-state">📭 ยังไม่มีคิว</div>';
                    return;
                }

                let html = '';
                queues.forEach(queue => {
                    const statusText = getStatusText(queue.status);
                    html += `
                        <div class="queue-item ${queue.status === 'completed' ? 'completed' : ''}">
                            <div class="queue-info">
                                <div class="queue-number">ลำดับที่ ${queue.queueNumber}</div>
                                <div class="queue-details">
                                    <p>👤 ${queue.displayName}</p>
                                    <p>📅 ${new Date(queue.bookingTime).toLocaleString('th-TH')}</p>
                                    ${queue.type === 'phone' ? `<p>⏰ นัดหมาย: ${queue.scheduledDate} ${queue.scheduledTime} (${queue.duration} นาที)</p>` : ''}
                                    <p>สถานะ: ${statusText}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });

                queueList.innerHTML = html;
            } catch (error) {
                console.error('Load Queues Error:', error);
            }
        }

        async function loadAdminQueues() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/queues`);
                const data = await response.json();
                const queues = data.queues || [];

                const adminQueueList = document.getElementById('adminQueueList');

                if (queues.length === 0) {
                    adminQueueList.innerHTML = '<div class="empty-state">📭 ยังไม่มีคิว</div>';
                    return;
                }

                let html = '';
                queues.forEach(queue => {
                    if (queue.status !== 'completed') {
                        html += `
                            <div class="queue-item">
                                <div class="queue-info">
                                    <div class="queue-number">ลำดับที่ ${queue.queueNumber}</div>
                                    <div class="queue-details">
                                        <p>👤 ${queue.displayName}</p>
                                        <p>📅 ${new Date(queue.bookingTime).toLocaleString('th-TH')}</p>
                                        ${queue.type === 'phone' ? `<p>⏰ นัดหมาย: ${queue.scheduledDate} ${queue.scheduledTime}</p>` : ''}
                                        <p><a href="${API_BASE_URL}${queue.slipUrl}" target="_blank">📸 ดูรูปสลิป</a></p>
                                    </div>
                                </div>
                                <div class="queue-actions">
                                    <button class="button" onclick="callQueue(${queue.id})">📢 เรียกคิว</button>
                                    <button class="button danger" onclick="completeQueue(${queue.id})">✅ ปิดคิว</button>
                                </div>
                            </div>
                        `;
                    }
                });

                adminQueueList.innerHTML = html;
            } catch (error) {
                console.error('Load Admin Queues Error:', error);
            }
        }

        async function callQueue(queueId) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/call-queue/${queueId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('Failed to call queue');

                alert('เรียกคิวสำเร็จ');
                loadAdminQueues();
            } catch (error) {
                alert('เกิดข้อผิดพลาด: ' + error.message);
            }
        }

        async function completeQueue(queueId) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/complete-queue/${queueId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('Failed to complete queue');

                alert('ปิดคิวสำเร็จ');
                loadAdminQueues();
            } catch (error) {
                alert('เกิดข้อผิดพลาด: ' + error.message);
            }
        }

        // ============ HELPER FUNCTIONS ============
        function getStatusText(status) {
            const statuses = {
                'waiting': '⏳ รอคิว',
                'called': '📢 เรียกแล้ว',
                'completed': '✅ เสร็จสิ้น'
            };
            return statuses[status] || status;
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
